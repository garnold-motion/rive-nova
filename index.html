<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nova Kiosk - Flappy Nova Boy</title>
    <style>
        html, body {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #0e1111;
            touch-action: none; 
            -webkit-user-select: none; 
            user-select: none;
        }
        
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            touch-action: none; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@rive-app/canvas"></script>

    <script>
        const canvasEl = document.getElementById("canvas");
        
        canvasEl.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
        window.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); return false; };

        const _supabaseUrl = 'https://hrkjbovvpkmuztptugue.supabase.co';
        const _supabaseKey = 'sb_publishable_goOeMWmWat9zoO6SJRGByQ_k-SyirFq';
        const supa = supabase.createClient(_supabaseUrl, _supabaseKey);

        let gameVM;

        async function saveScoreToSupabase(scoreValue, nameValue) {
            const { error } = await supa
                .from('flappy_nova_boy')
                .insert([{ name: nameValue, score: scoreValue }]);
            if (!error) refreshLeaderboard();
        }

        async function refreshLeaderboard() {
            const { data, error } = await supa
                .from('flappy_nova_boy')
                .select('name, score')
                .order('score', { ascending : false })
                .limit(5);

            if (data && !error && gameVM) {
                data.forEach((row, index) => {
                    const rank = index + 1;
                    const nameProp = gameVM.string("name" + rank);
                    const scoreProp = gameVM.string("score" + rank);
                    if (nameProp && scoreProp) {
                        nameProp.value = row.name;
                        scoreProp.value = row.score.toString();
                    }
                });
            }
        }

        async function checkSupabaseTop5(playerScore) {
            const { data, error } = await supa
                .from('flappy_nova_boy')
                .select('score')
                .order('score', { ascending: false })
                .limit(5);
            if (error) return false;
            if (data.length < 5) return true;
            return playerScore > data[data.length - 1].score;
        }

        const r = new rive.Rive({
            src: "flappy_nova_boy.riv",
            artboard: "Export",
            canvas: canvasEl,
            autoBind: true,
            autoplay: true,
            stateMachines: "State Machine 1",
            layout: new rive.Layout({

                fit: rive.Fit.Cover, 
                alignment: rive.Alignment.Center
            }),
            onLoad: async () => {
                r.resizeDrawingSurfaceToCanvas();

                const vmi = r.viewModelInstance.viewModel("game");
                gameVM = vmi; 
                refreshLeaderboard();

                const deadProp = vmi.boolean("dead");
                const isTop5Prop = vmi.boolean("isTop5");
                const scoreProp = vmi.number("score");
                const resetProp = vmi.boolean("resetGame");
                const isSubmittingProp = vmi.boolean("isSubmitting");
                const nameInputProp = vmi.string("nameInput");

                deadProp.on((isDead) => {
                    if (isDead) {
                        checkSupabaseTop5(scoreProp.value).then(isHighEnough => {
                            isTop5Prop.value = isHighEnough;
                        });
                    }
                });

                isSubmittingProp.on((isSubmitting) => {
                    if (isSubmitting) {
                        const finalName = nameInputProp.value || "Nova Guest";
                        saveScoreToSupabase(scoreProp.value, finalName).then(() => {
                            isSubmittingProp.value = false;
                        });
                        resetProp.value = true;
                    }
                });
            }
        });

        window.onresize = () => r.resizeDrawingSurfaceToCanvas();
    </script>
</body>
</html>
