<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Kiosk</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #nova-canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="nova-canvas"></canvas>

<script src="https://unpkg.com/@rive-app/canvas@latest"></script>
<script>
    const project = "flappy_nova_boy.riv";
    let currentRive;

    function initRive() {
        currentRive = new rive.Rive({
            artboard: "Main",
            autoBind: true,
            src: project,
            canvas: document.getElementById("nova-canvas"),
            autoplay: true,
            stateMachines: "State Machine 1",
            layout: new rive.Layout({
                fit: rive.Fit.Contain, // Shows the full artboard without cropping
                alignment: rive.Alignment.Center
            }),
            onLoad: () => {
                currentRive.resizeDrawingSurfaceToCanvas();
            }
        });
    }

    // Ensures the game stays sharp and centered if the browser is resized
    window.onresize = () => {
        if (currentRive) currentRive.resizeDrawingSurfaceToCanvas();
    };

    initRive();
</script>
</body>
</html>
