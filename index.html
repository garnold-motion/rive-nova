<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nova Kiosk - Flappy Nova Boy</title>
    <style>
        html, body {

            position: fixed; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            overflow: hidden;
            touch-action: none; 
            
            -webkit-user-select: none; 
            user-select: none;
        }
        
        #canvas {
            height: 100%;
            width: auto;
            display: block;
            aspect-ratio: 270 / 480;
            touch-action: none; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }
    </style>
</head>
<body>

    <canvas id="canvas" width="270" height="480"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@rive-app/canvas"></script>

    <script>

        const canvasEl = document.getElementById("canvas");
        canvasEl.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
        canvasEl.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
        window.oncontextmenu = function(event) {
             event.preventDefault();
             event.stopPropagation();
             return false;
        };

        const _supabaseUrl = 'https://hrkjbovvpkmuztptugue.supabase.co';
        const _supabaseKey = 'sb_publishable_goOeMWmWat9zoO6SJRGByQ_k-SyirFq';
        const supa = supabase.createClient(_supabaseUrl, _supabaseKey);

        let gameVM;

        async function saveScoreToSupabase(scoreValue, nameValue) {
            console.log(`Attempting to save: ${nameValue} - ${scoreValue}`);
            
            const { error } = await supa
                .from('flappy_nova_boy')
                .insert([{ name: nameValue, score: scoreValue }]);

            if (error) {
                console.error("Save Error:", error);
            } else {
                console.log("Score saved successfully!");
                refreshLeaderboard();
            }
        }

        async function refreshLeaderboard() {
            const { data, error } = await supa
                .from('flappy_nova_boy')
                .select('name, score')
                .order('score', { ascending : false })
                .limit(5);

            if (data && !error && gameVM) {
                data.forEach((row, index) => {
                    const rank = index + 1;
                    const nameProp = gameVM.string("name" + rank);
                    const scoreProp = gameVM.string("score" + rank);

                    if (nameProp && scoreProp) {
                        nameProp.value = row.name;
                        scoreProp.value = row.score.toString();
                    }
                });
                console.log("Leaderboard updated on screen.");
            }
        }

        async function checkSupabaseTop5(playerScore) {
            const { data, error } = await supa
                .from('flappy_nova_boy')
                .select('score')
                .order('score', { ascending: false })
                .limit(5);

            if (error) return false;
            if (data.length < 5) return true;

            const fifthPlaceScore = data[data.length - 1].score;
            return playerScore > fifthPlaceScore;
        }

        const r = new rive.Rive({
            src: "flappy_nova_boy.riv",
            canvas: document.getElementById("canvas"),
            autoBind: true,
            autoplay: true,
            stateMachines: "State Machine 1",
            onLoad: async () => {
                r.resizeDrawingSurfaceToCanvas();

                const vmi = r.viewModelInstance.viewModel("game");
                gameVM = vmi; 
                
                refreshLeaderboard();

                const deadProp = vmi.boolean("dead");
                const isTop5Prop = vmi.boolean("isTop5");
                const scoreProp = vmi.number("score");
                const resetProp = vmi.boolean("resetGame")

                deadProp.on((isDead) => {
                    if (isDead === true) {
                        console.log("Death detected. Checking Top 5...");
                        checkSupabaseTop5(scoreProp.value).then(isHighEnough => {
                            isTop5Prop.value = isHighEnough;
                            if (isHighEnough) console.log("Show Keyboard - Top 5 reached!");
                        });
                    }
                });

                const isSubmittingProp = vmi.boolean("isSubmitting");
                const nameInputProp = vmi.string("nameInput");

                isSubmittingProp.on((isSubmitting) => {
                    if (isSubmitting === true) {
                        const finalName = nameInputProp.value || "Nova Guest";
                        const finalScore = scoreProp.value;

                        saveScoreToSupabase(finalScore, finalName).then(() => {
                            isSubmittingProp.value = false;
                        });
                        
                        resetProp.value = true;
                    }
                });
            }
        });

        window.onresize = () => r.resizeDrawingSurfaceToCanvas();
    </script>
</body>
</html>
